<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VT A</title>
  <!-- Long transition so a mid-transition click is observable. -->
  <style>::view-transition-old(root),::view-transition-new(root){animation-duration:1s}</style>
  <script src="/sparke.js" data-transitions></script>
</head>
<body>
  <main>
    <h1 style="view-transition-name:hero">VT A</h1>
    <h2 style="view-transition-name:sub">subtitle A</h2>
    <p><a id="toB" href="/demo/_vtB">to B</a></p>
  </main>
</body>
</html>
