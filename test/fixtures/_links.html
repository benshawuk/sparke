<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Links</title>
  <script src="/sparke.js" data-test></script>
</head>
<body>
  <main>
    <h1>Links</h1>
    <a id="same" href="/demo/_p2">same-origin</a>
    <a id="cross" href="https://example.com/page">cross-origin</a>
    <a id="blank" target="_blank" href="/demo/_p1">blank</a>
    <a id="self" target="_self" href="/demo/about">self</a>
    <a id="download" download href="/demo/_p1">download</a>
    <a id="external" rel="external" href="/demo/_p3">external</a>
    <a id="hashonly" href="#section">hash only</a>
    <a id="mailto" href="mailto:hi@example.com">mail</a>
    <a id="tel" href="tel:+123">tel</a>
    <a id="js" href="javascript:void(0)">js</a>
    <a id="nohref">no href</a>
    <a id="protorel" href="//example.com/page">protocol relative</a>
    <a id="dup1" href="/demo/features">features 1</a>
    <a id="dup2" href="/demo/features">features 2</a>
    <h2 id="section">Section</h2>
  </main>
</body>
</html>
